<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/dice.png">
    <link rel="stylesheet" href="style.css" />
    <title>Dice Game</title>
  </head>
  <body>
    <div class="container">
      <section class="center">
        <button class="new">🔄 new game</button>
        <span class="dice">
            <span class="d four five six"></span>
            <span class="d six"></span>
            <span class="d tow three four five six"></span>
            <span class="d tow three four five six"></span>
            <span class="d six"></span>
            <span class="d four five six"></span>
            <span class="d one three five"></span>
        </span>
        <button class="roll">🎲 roll dice</button>
        <button class="hold">📥 hold</button>
      </section>
      <section class="left">
        <h1>player 1</h1>
        <p class="score">0</p>
        <div class="current">
          <p>current</p>
          <span class="crt">0</span>
        </div>
      </section>
      <section class="right">
        <h1>player 1</h1>
        <p class="score">0</p>
        <div class="current">
          <p>current</p>
          <span class="crt">0</span>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
